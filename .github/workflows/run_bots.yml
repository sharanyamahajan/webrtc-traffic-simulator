name: Parallel Traffic Deployment

on:
  workflow_dispatch:
    inputs:
      meet_url:
        description: 'Paste your target meeting link here'
        required: true
        default: 'https://meet.google.com/abc-defg-hij'

jobs:
  deploy_nodes:
    runs-on: ubuntu-latest
    strategy:
      # This matrix creates 4 entirely separate servers running simultaneously
      matrix:
        batch: [0, 1, 2, 3]
    steps:
    - name: Pull Code From Repository
      uses: actions/checkout@v3

    - name: Initialize Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Automation Packages
      run: |
        pip install playwright
        playwright install chromium --with-deps

    - name: Execute Automation Script on Cloud Node
      env:
        MEET_URL: ${{ github.event.inputs.meet_url }}
        BATCH_NUM: ${{ matrix.batch }}
      run: |
        python bot_worker.py
