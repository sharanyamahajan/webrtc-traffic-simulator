name: Parallel Traffic Deployment

on:
  workflow_dispatch:
    inputs:
      meet_url:
        description: 'Paste your target meeting link here'
        required: true
        default: 'https://meet.google.com/abc-defg-hij'

jobs:
  deploy_nodes:
    runs-on: ubuntu-latest
    
    # ─── THIS IS EXACTLY WHERE IT GOES ───
    strategy:
      max-parallel: 4  # Forces GitHub to run all 4 servers at the exact same time
      fail-fast: false
      matrix:
        batch: [0, 1, 2, 3]
    # ─────────────────────────────────────

    steps:
    - name: Pull Code From Repository
      uses: actions/checkout@v4

    - name: Initialize Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Automation Packages
      run: |
        pip install playwright
        playwright install chromium --with-deps

    - name: Execute Automation Script on Cloud Node
      env:
        MEET_URL: ${{ github.event.inputs.meet_url }}
        BATCH_NUM: ${{ matrix.batch }}
      run: |
        python bot_worker.py
